<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Олимпиадная Экономика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📊</span>
                <h1>EconOlymp</h1>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-section="modules">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">Модули</span>
                </button>
                <button class="nav-btn" data-section="shop">
                    <span class="nav-icon">🛒</span>
                    <span class="nav-text">Магазин</span>
                </button>
                <button class="nav-btn" data-section="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">Профиль</span>
                </button>
            </nav>
            <div class="score-display">
                <span class="score-icon">⭐</span>
                <span id="totalScore">0</span>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Modules Section -->
            <section id="modules" class="section active">
                <h2 class="section-title">Модули обучения</h2>
                <div class="modules-grid" id="modulesGrid"></div>
            </section>

            <!-- Module Detail Section -->
            <section id="moduleDetail" class="section">
                <button class="back-btn" id="backToModules">← Назад к модулям</button>
                <div class="module-header">
                    <div class="module-icon" id="moduleIcon"></div>
                    <h2 id="moduleTitle"></h2>
                </div>
                <div class="module-tabs">
                    <button class="tab-btn active" data-tab="theory">Теория</button>
                    <button class="tab-btn" data-tab="tasks">Задания</button>
                    <button class="tab-btn" data-tab="progress">Прогресс</button>
                </div>
                <div class="tab-content">
                    <div id="theoryTab" class="tab-panel active"></div>
                    <div id="tasksTab" class="tab-panel"></div>
                    <div id="progressTab" class="tab-panel"></div>
                </div>
            </section>

            <!-- Shop Section -->
            <section id="shop" class="section">
                <h2 class="section-title">Магазин</h2>
                <p class="shop-description">Покупайте улучшения и кастомизацию за заработанные баллы!</p>
                <div class="shop-grid" id="shopGrid"></div>
            </section>

            <!-- Profile Section -->
            <section id="profile" class="section">
                <h2 class="section-title">Ваш прогресс</h2>
                <div class="profile-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="profileScore">0</div>
                        <div class="stat-label">Всего баллов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="profileProgress">0%</div>
                        <div class="stat-label">Прогресс курса</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="profileTasksCompleted">0/0</div>
                        <div class="stat-label">Выполнено заданий</div>
                    </div>
                </div>
                <div class="inventory-section">
                    <h3>Ваши покупки</h3>
                    <div id="inventoryList" class="inventory-list"></div>
                </div>
            </section>
        </main>

        <!-- Mobile Navigation -->
        <nav class="mobile-nav" id="mobileNav">
            <button class="mobile-nav-btn active" data-section="modules">
                <span>📚</span>
                <span>Модули</span>
            </button>
            <button class="mobile-nav-btn" data-section="shop">
                <span>🛒</span>
                <span>Магазин</span>
            </button>
            <button class="mobile-nav-btn" data-section="profile">
                <span>👤</span>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
