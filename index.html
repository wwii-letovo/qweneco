<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlympEcon - Олимпиадная Экономика</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">📈</span>
            <span class="logo-text">OlympEcon</span>
        </div>
        <div class="nav-links">
            <button class="nav-btn active" data-view="modules">Модули</button>
            <button class="nav-btn" data-view="shop">Магазин</button>
            <button class="nav-btn" data-view="profile">Профиль</button>
        </div>
        <div class="user-stats-mini">
            <span id="mini-score">0</span> 💰
        </div>
    </nav>

    <!-- Основной контейнер -->
    <main class="container">
        
        <!-- Экран Модулей -->
        <section id="view-modules" class="view active">
            <h1 class="page-title">Программа обучения</h1>
            <div class="modules-grid" id="modules-container">
                <!-- Карточки модулей -->
            </div>
        </section>

        <!-- Экран Магазина -->
        <section id="view-shop" class="view">
            <h1 class="page-title">Магазин улучшений</h1>
            <p class="subtitle">Покупайте темы оформления и достижения за баллы.</p>
            <div class="shop-grid" id="shop-container">
                <!-- Товары -->
            </div>
        </section>

        <!-- Экран Профиля -->
        <section id="view-profile" class="view">
            <h1 class="page-title">Ваш прогресс</h1>
            <div class="profile-card">
                <div class="profile-header">
                    <div class="avatar">🎓</div>
                    <div class="stats-big">
                        <div class="stat-item">
                            <span class="stat-value" id="total-score">0</span>
                            <span class="stat-label">Всего баллов</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="total-progress">0%</span>
                            <span class="stat-label">Прогресс курса</span>
                        </div>
                    </div>
                </div>
                
                <div class="inventory-section">
                    <h3>Ваши покупки и темы</h3>
                    <p class="hint">Нажмите на тему, чтобы применить её.</p>
                    <div class="inventory-grid" id="inventory-container">
                        <!-- Инвентарь -->
                    </div>
                </div>

                <div class="reset-section">
                    <button id="reset-progress-btn" class="btn-danger">Сбросить весь прогресс</button>
                </div>
            </div>
        </section>

        <!-- Экран Деталей Модуля -->
        <section id="view-module-detail" class="view">
            <button class="back-btn" onclick="app.navigate('modules')">← Назад к модулям</button>
            
            <div class="module-header">
                <h1 id="detail-title">Название модуля</h1>
                <div class="module-badges">
                    <span class="badge progress-badge">Прогресс: <span id="detail-progress">0%</span></span>
                    <span class="badge score-badge">Баллы: <span id="detail-score">0</span></span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="theory">Теория</button>
                <button class="tab-btn" data-tab="tasks">Задания</button>
            </div>

            <div class="tab-content">
                <div id="tab-theory" class="content-block active">
                    <div id="theory-container" class="accordion"></div>
                </div>
                <div id="tab-tasks" class="content-block">
                    <div id="tasks-container"></div>
                </div>
            </div>
        </section>

    </main>

    <div id="toast-container"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
